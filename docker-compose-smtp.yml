# SMTP Test Server - For local development only
# Not part of the main system
#
# Usage:
#   docker compose -f docker-compose-smtp.yml up -d
#
# After starting, configure your backend .env:
#   SMTP_HOST=localhost
#   SMTP_PORT=1025
#
# Access the MailHog UI at: http://localhost:8025

services:
  mailhog:
    image: mailhog/mailhog:latest
    container_name: testtool-smtp
    ports:
      - "1025:1025"   # SMTP server (for sending emails)
      - "8025:8025"   # Web UI (for viewing emails)
    networks:
      - testtool-smtp

networks:
  testtool-smtp:
    name: testtool-smtp-network
