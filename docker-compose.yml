# Profiles:
#   local-db — starts postgres and backup containers (on-premise / full-local mode)
#
# Usage:
#   Full-local:  docker-compose --profile local-db up
#   Cloud DB:    docker-compose up

services:
  postgres:
    image: postgres:16-alpine
    profiles: [local-db]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testtool
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/data/uploads
      - logs_data:/logs
    networks:
      - internal
      - public
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["node", "dist/worker.js"]
    env_file: .env
    volumes:
      - uploads_data:/data/uploads
      - logs_data:/logs
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "3000:3000"
    networks:
      - public
    depends_on:
      - backend

  backup:
    image: postgres:16-alpine
    profiles: [local-db]
    env_file: .env
    volumes:
      - backups_data:/data/backups
    networks:
      - internal
    entrypoint: >
      sh -c "apk add --no-cache busybox && echo '0 2 * * * pg_dump $$DATABASE_URL -F c -f /data/backups/testtool_$$(date +\\%Y\\%m\\%d_\\%H\\%M\\%S).dump' | crontab - && crond -f -l 8"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  backups_data:
  logs_data:

networks:
  internal:
  public:
